version: 0.2

os: linux

phases:
  install:
    runtime-versions:
      java: corretto11  # Or whichever Java version you need
  build:
    commands:
      - echo "Build phase: nothing to do if WAR is already built"
  post_build:
    commands:
      - echo "Post-build phase complete"

artifacts:
  files:
    - target/nextwork-web-project.war

hooks:
  BeforeInstall:
    - location: scripts/stop_tomcat.sh
      timeout: 300
      runas: root

  AfterInstall:
    - location: scripts/start_tomcat.sh
      timeout: 300
      runas: root

