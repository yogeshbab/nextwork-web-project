version: 0.0
os: linux

files:
  - source: target/nextwork-web-project.war
    destination: /opt/tomcat/webapps/

hooks:
  BeforeInstall:
    - location: scripts/stop_tomcat.sh
      timeout: 300
      runas: root

  AfterInstall:
    - location: scripts/start_tomcat.sh
      timeout: 300
      runas: root
